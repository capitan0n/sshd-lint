# ==========================================================================
# realistic.conf — a plausible real-world sshd_config.
#
# This is the kind of config you actually find on a box someone set up in a
# hurry: mostly sane, but with the handful of loose ends that survive into
# production — password auth left on, X11 forwarding enabled for a desktop
# user and never turned back off, no explicit allowlist, and several
# defaults left untouched.
#
# Expected shape: a spread of LOW/MEDIUM findings and exactly one HIGH
# (password authentication), with NO CRITICAL. It still fails a
# `--severity high` gate, which is the point.
# ==========================================================================

# Port left at the default — noisy in the logs, but not itself a vulnerability
Port 22

LogLevel INFO

# Root may log in with a key only. Better than 'yes', but still least-
# privilege-unfriendly, so it is flagged at MEDIUM.
PermitRootLogin prohibit-password

# Password authentication left enabled — the single most common real-world
# weakness. This is the one HIGH finding.
PasswordAuthentication yes
PubkeyAuthentication yes

# LoginGraceTime and MaxAuthTries are left at their insecure-ish defaults
# (120s and 6) rather than being tightened.

# X11 forwarding switched on for a desktop session and never reverted
X11Forwarding yes

# No AllowUsers / AllowGroups allowlist: any valid local account can log in

# No login banner configured

AcceptEnv LANG LC_*
Subsystem sftp /usr/lib/openssh/sftp-server
