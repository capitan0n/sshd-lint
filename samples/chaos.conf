# ==========================================================================
# chaos.conf — a deliberately catastrophic sshd_config.
#
# Every setting here is chosen to be as insecure as possible. It exists so
# the test suite can confirm sshd_lint lights up across every category:
# authentication, cryptography, forwarding, logging, access control,
# duplicates, and Match-block overrides.
#
# DO NOT deploy this. Ever.
# ==========================================================================

Port 22
ListenAddress 0.0.0.0

# --- Broken / legacy cryptography (rules 40-43) --------------------------
Ciphers 3des-cbc,aes128-cbc
MACs hmac-md5
KexAlgorithms diffie-hellman-group1-sha1
HostKeyAlgorithms ssh-dss,ssh-rsa

# --- No logging, so an intrusion leaves no trace (rule 30) ---------------
LogLevel QUIET

# --- Authentication wide open (rules 01-06) ------------------------------
PermitRootLogin yes
PasswordAuthentication yes
PermitEmptyPasswords yes
ChallengeResponseAuthentication yes
PubkeyAuthentication no

# Trust any user's ~/.rhosts file
HostbasedAuthentication yes
IgnoreRhosts no

# --- No brute-force or DoS limits (rules 10-13, 51) ----------------------
LoginGraceTime 0
MaxAuthTries 999
MaxSessions 999
MaxStartups 999:99:999
StrictModes no

# --- Full pivoting / tunneling freedom for an attacker (rules 20-24) -----
AllowAgentForwarding yes
AllowTcpForwarding yes
GatewayPorts yes
X11Forwarding yes
PermitTunnel yes

# --- Sessions never time out, users inject their own env (rules 53, 57) --
ClientAliveInterval 0
PermitUserEnvironment yes

# --- Duplicate global directive: sshd silently ignores the 2nd (rule 56) -
Banner /etc/issue.net
Banner /etc/nologin

# --- A Match block that re-opens root + passwords for a whole subnet.
#     This is a *scoped* risk, and rule 55 should report it as such,
#     tagged with the Match condition rather than as a global finding.
Match Address 10.0.0.0/8
    PermitRootLogin yes
    PasswordAuthentication yes
