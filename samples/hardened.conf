# ==========================================================================
# hardened.conf — a defensively-configured sshd_config.
#
# Follows CIS Benchmark / Mozilla OpenSSH guidance. sshd_lint should return
# ZERO findings (exit code 0) against this file. It doubles as the
# "known-good" baseline for the test suite: if a future change makes this
# config produce a finding, either the config or the rule that fired needs
# a second look.
#
# Cryptography directives (Ciphers/MACs/KexAlgorithms/HostKeyAlgorithms)
# are intentionally omitted so the secure compiled-in OpenSSH defaults
# apply — rules 40-43 only evaluate an explicitly-set list.
# ==========================================================================

# Non-default port to cut automated-scanner noise. Defence in depth, not a
# substitute for strong authentication. Deliberately not a well-known SSH
# alternate like 2222/2022 -- those are as bot-scanned as 22 itself.
Port 51022

LogLevel VERBOSE

# --- Authentication: keys only, no root, no passwords --------------------
PermitRootLogin no
PasswordAuthentication no
PermitEmptyPasswords no
PubkeyAuthentication yes
ChallengeResponseAuthentication no
HostbasedAuthentication no
IgnoreRhosts yes

# --- Explicit allowlist: only members of this group may authenticate -----
AllowGroups sshusers

# --- Brute-force and DoS limits ------------------------------------------
LoginGraceTime 30
MaxAuthTries 3
MaxSessions 4
MaxStartups 10:30:60
StrictModes yes

# --- Forwarding disabled unless a specific need is established ------------
X11Forwarding no
AllowTcpForwarding no
AllowAgentForwarding no
GatewayPorts no
PermitTunnel no

# --- Idle sessions are disconnected after ~10 minutes --------------------
ClientAliveInterval 300
ClientAliveCountMax 2

# --- Session hygiene -----------------------------------------------------
PermitUserEnvironment no
PrintLastLog yes
UseDNS no

# --- Legal / policy banner shown before authentication -------------------
Banner /etc/issue.net

AcceptEnv LANG LC_*
Subsystem sftp /usr/lib/openssh/sftp-server
